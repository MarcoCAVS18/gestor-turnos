<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./assets/images/logo1.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#EC4899" />
    <!-- Fallback title so any route served without prerender still has a real
         title (otherwise Google falls back to just the brand name "Orary").
         Helmet/prerender override this per-route. -->
    <title>Orary — Free Shift Tracker &amp; Earnings Calculator</title>
    <meta name="description" content="Track your work shifts, calculate earnings automatically, and analyze your income with detailed statistics. Free shift management app for workers worldwide." />
    <meta name="keywords" content="shift management, work scheduler, earnings tracker, shift planner, time tracking, payroll calculator, work hours, roster app, shift calculator, delivery earnings, work schedule app, pay tracker" />
    <meta name="author" content="Orary" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:0" />

    <!-- Social meta (og:title/description/url/image/type, twitter:*) is set
         per-route by react-helmet-async. It is intentionally NOT hardcoded here:
         the prerender de-dupes <title>/description/og:title/og:description, but NOT
         og:type/og:url/twitter:*, so a static copy would leave duplicate/stale tags
         (e.g. og:url pinned to the homepage, og:type "website" on article pages).
         Pages are pre-rendered, so crawlers see the per-route tags in the served HTML. -->
    <meta property="og:site_name" content="Orary" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="es_ES" />
    <meta property="og:locale:alternate" content="fr_FR" />

    <!-- hreflang: single URL for all languages, x-default only -->
    <link rel="alternate" hreflang="x-default" href="https://orary.app/" />

    <link rel="apple-touch-icon" href="./assets/images/logo2.png" />
    <!-- Canonical is set per-page via react-helmet-async -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to critical third-party origins -->
    <link rel="preconnect" href="https://gestionturnos-7ec99.firebaseapp.com" crossorigin />
    <link rel="preconnect" href="https://apis.google.com" crossorigin />

    <!-- Preload LCP element -->
    <link rel="preload" href="/assets/SVG/logo.svg" as="image" type="image/svg+xml" />

    <!-- Preload the two most-used Poppins weights only — avoids bandwidth contention -->
    <link rel="preload" href="/assets/fonts/poppins/Poppins-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/poppins/Poppins-SemiBold.woff2" as="font" type="font/woff2" crossorigin />

    <!-- @font-face inlined — no extra CSS request, browser knows the fonts immediately.
         WOFF2 first (all modern browsers), TTF fallback for older ones. -->
    <style>
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-Light.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-Light.ttf') format('truetype');font-weight:300;font-style:normal;font-display:swap}
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-Regular.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-Regular.ttf') format('truetype');font-weight:400;font-style:normal;font-display:swap}
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-Italic.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-Italic.ttf') format('truetype');font-weight:400;font-style:italic;font-display:swap}
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-Medium.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-Medium.ttf') format('truetype');font-weight:500;font-style:normal;font-display:swap}
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-SemiBold.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-SemiBold.ttf') format('truetype');font-weight:600;font-style:normal;font-display:swap}
      @font-face{font-family:'Poppins';src:url('/assets/fonts/poppins/Poppins-Bold.woff2') format('woff2'),url('/assets/fonts/poppins/Poppins-Bold.ttf') format('truetype');font-weight:700;font-style:normal;font-display:swap}
    </style>

    <!-- Structured Data - WebSite (drives the "site name" shown in Google results,
         so it says "Orary" instead of the bare domain "orary.app") -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Orary",
      "alternateName": "Orary — Shift Tracker",
      "url": "https://orary.app/"
    }
    </script>

    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Orary",
      "alternateName": "Orary Shift Tracker",
      "description": "Track your work shifts, calculate earnings automatically, and analyze your income with detailed statistics. Free shift management app for workers worldwide.",
      "url": "https://orary.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires JavaScript. Requires HTML5.",
      "softwareVersion": "2.0",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "2.99",
        "priceCurrency": "USD",
        "offerCount": "2",
        "offers": [
          {
            "@type": "Offer",
            "name": "Free Plan",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Core shift tracking and earnings calculation features"
          },
          {
            "@type": "Offer",
            "name": "Premium Plan",
            "price": "2.99",
            "priceCurrency": "USD",
            "description": "Advanced analytics, exports, and premium features"
          }
        ]
      },
      "featureList": "Shift scheduling, Earnings calculation, Delivery tracking, Statistics dashboard, PDF/Excel export, Live mode timer, Working Holiday Visa tracker, Payslip auto-detection",
      "image": "https://orary.app/assets/images/logo2.png",
      "author": {
        "@type": "Organization",
        "name": "Orary",
        "url": "https://orary.app"
      }
    }
    </script>

    <!-- Title managed per-page by react-helmet-async -->

    <!-- Google Analytics — loaded only after cookie consent -->
    <!-- Consent is stored in localStorage key "orary_cookie_consent" = "accepted" | "declined" -->
    <!-- The React CookieConsent component manages the banner and calls window.loadGA() -->
    <!-- GA ID is passed via meta tag so ga-consent.js can be a static file (no unsafe-inline needed) -->
    <meta name="ga-id" content="%REACT_APP_GA_ID%" />
    <script defer src="/ga-consent.js"></script>
  </head>
  <body>
    <noscript><style>*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}body{background:#f9fafb;color:#111827}.ns-wrap{max-width:640px;margin:60px auto;padding:40px 24px;text-align:center}.ns-logo{font-size:2.5rem;font-weight:800;color:#EC4899;margin-bottom:12px}.ns-h1{font-size:1.5rem;font-weight:700;margin-bottom:12px}.ns-p{color:#6b7280;line-height:1.6;margin-bottom:28px}.ns-cta{display:inline-block;background:#EC4899;color:#fff;padding:12px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:1rem;margin-bottom:32px}.ns-foot{font-size:.875rem;color:#9ca3af}.ns-foot a{color:#EC4899}</style><div class="ns-wrap"><div class="ns-logo">Orary</div><h1 class="ns-h1">Work Shift Management &amp; Earnings Tracker</h1><p class="ns-p">Orary helps workers track their shifts, calculate earnings automatically, monitor delivery income, and analyze their income with detailed statistics. Free for all workers worldwide.</p><a href="/login" class="ns-cta">Get Started Free</a><div class="ns-foot"><p>JavaScript is required to run the full application.</p><p style="margin-top:8px"><a href="/privacy">Privacy Policy</a> &middot; <a href="/terms">Terms of Service</a></p></div></div></noscript>
    <div id="root"></div>
  </body>
</html>
