    <!-- Google Analytics — loaded only after cookie consent -->
    <!-- Consent is stored in localStorage key "orary_cookie_consent" = "accepted" | "declined" -->
    <!-- The React CookieConsent component manages the banner and calls window.loadGA() -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        wait_for_update: 2000
      });
      window.loadGA = function() {
        if (window._gaLoaded) return;
        window._gaLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=%REACT_APP_GA_ID%';
        document.head.appendChild(s);
        s.onload = function() {
          gtag('js', new Date());
          gtag('config', '%REACT_APP_GA_ID%');
          gtag('consent', 'update', { analytics_storage: 'granted' });
        };
      };
      // Auto-load GA if user already accepted consent in a previous session
      if (localStorage.getItem('orary_cookie_consent') === 'accepted') {
        window.loadGA();
      }
    </script>
